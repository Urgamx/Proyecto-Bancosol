spring.application.name=proyectoBancosol

# URL de conexión (asegúrate de que el puerto sea el correcto, usualmente 3306)
spring.datasource.url=jdbc:mariadb://localhost:3306/nombre_de_tu_db
spring.datasource.username=tu_usuario
spring.datasource.password=tu_contraseńa
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.application.name=proyectoBancosol
# Configuración para encontrar los JSPs
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Configuración básica de la Base de Datos (ajusta tu password)
spring.datasource.url=jdbc:mysql://localhost:3306/BANCOSOL_DB
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Importante para que no borre tus tablas si usas el script SQL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true